name: Treo Web He Linux Xem Qua Trinh Duyet

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Cài đặt giao diện đồ họa và các ứng dụng mặc định Linux
      run: |
        sudo apt-get update
        # Cài đặt bộ công cụ hệ thống gọn nhẹ và thêm trình duyệt Firefox mặc định
        sudo apt-get install -y xvfb fluxbox x11vnc novnc websockify xterm pcmanfm mousepad lxmenu-data firefox

    - name: Tải và cài đặt Ngrok trên Linux
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y

    - name: Khởi chạy màn hình ảo và bật Ngrok HTTP
      run: |
        # 1. Tạo màn hình ảo ẩn dung lượng 1280x800
        Xvfb :1 -screen 0 1280x800x24 &
        export DISPLAY=:1
        sleep 2
        
        # 2. Bật trình quản lý cửa sổ Fluxbox
        fluxbox &
        sleep 2
        
        # 3. Mở cổng truyền hình ảnh vnc chống sập khi đóng/F5 tab
        x11vnc -display :1 -nopw -listen localhost -bg -forever -xkb
        sleep 2
        
        # 4. Chuyển đổi vnc thành giao diện Web (chạy cổng 6080)
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        sleep 2
        
        # 5. Cấu hình Token Ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # 6. Chạy Ngrok HTTP (Bẻ gãy trang cảnh báo và cho phép nhúng Iframe vào web riêng)
        ngrok http 6080 --log=stdout --request-header-add "ngrok-skip-browser-warning: true" --response-header-remove "Content-Security-Policy" > ngrok.log 2>&1 &
        
        # 7. Vòng lặp kiểm tra file log trích xuất link
        echo "Dang cho Ngrok cap nhat link..."
        LINK=""
        for i in {1..20}; do
          sleep 2
          if [ -f ngrok.log ]; then
            LINK=$(cat ngrok.log | grep -o 'https://[^ ]*ngrok-free\.\(app\|dev\)' | head -n 1 || true)
            if [ ! -z "$LINK" ]; then
              break
            fi
          fi
          echo "Thu lai lan $i/20..."
        done
        
        # 8. In kết quả ra màn hình công khai
        echo "=========================================="
        if [ ! -z "$LINK" ]; then
          echo "BAM VAO LINK NAY DE XEM MAN HINH WEB:"
          echo "$LINK/vnc.html"
          echo "Vào web xong chỉ cần bấm nút Connect là thấy Desktop!"
        else
          echo "Khong trich xuat duoc link tu log. Noi dung log hien tai:"
          cat ngrok.log || true
        fi
        echo "=========================================="
        
        # 9. Chỉ mở sẵn duy nhất Firefox cho sạch màn hình, cần app khác thì CLICK CHUỘT PHẢI
        firefox --no-sandbox &
        
        # Treo máy đúng 4 tiếng
        sleep 14400
