name: GitHub Actions RDP

on: 
  workflow_dispatch: # Chỉ chạy khi ông bấm nút thủ công

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub cho tối đa 6 tiếng thôi nhé

    steps:
    - name: Tải và thiết lập Ngrok bằng Choco
      run: |
        choco install ngrok
        
    - name: Kết nối tài khoản Ngrok
      run: |
        # Hệ thống tự bốc token từ GitHub Secrets ông đã cài
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: Kích hoạt RDP (Màn hình từ xa)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu cho User
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        # Đã đổi sang GamerChuaNet để không bị lỗi trùng User có sẵn của GitHub
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: Mở cổng và lấy Link kết nối
      run: |
        # Gọi thẳng file exe từ thư mục cài đặt của Choco cho chắc cú
        Start-Process -FilePath "C:\ProgramData\chocolatey\bin\ngrok.exe" -ArgumentList "tcp 3389"
        
        # Vòng lặp đợi Ngrok khởi động (thử tối đa 6 lần, mỗi lần cách nhau 5 giây)
        $Attempts = 0
        $MaxAttempts = 6
        $Success = $false
        
        while (-not $Success -and $Attempts -lt $MaxAttempts) {
            try {
                Start-Sleep -Seconds 5
                $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing
                $Success = $true
            } catch {
                $Attempts++
                Write-Host "Đang đợi Ngrok khởi động... (Lần $Attempts/$MaxAttempts)"
            }
        }
        
        if ($Success) {
            # Bốc link kết nối công khai ra màn hình log
            $Response.Content | Select-String -Pattern 'tcp://[^"]+' -AllMatches | % { $_.Matches } | % { $_.Value }
        } else {
            Write-Error "Ngrok không chịu khởi động rồi ông ơi!"
            exit 1
        }
