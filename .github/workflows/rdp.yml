name: GitHub Actions RDP

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 

    steps:
    - name: Cài đặt Ngrok chính thức bằng Winget
      run: |
        Write-Host "Đang dùng Winget để cài đặt Ngrok bản mới nhất..."
        # Winget cài cực sạch, tự động nhận cấu hình môi trường
        winget install ngrok.ngrok --accept-source-agreements --accept-package-agreements
        
        # Làm mới lại biến Path ngay tại step này để nhận lệnh ngrok
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Kiểm tra xem hệ thống đã nhận lệnh ngrok chưa
        if (Get-Command ngrok -ErrorAction SilentlyContinue) {
            Write-Host "Ngon lành! Hệ thống đã nhận lệnh ngrok."
        } else {
            Write-Error "Winget cài xong nhưng chưa nhận lệnh. Thử tìm file thủ công..."
            # Dự phòng nếu winget ném vào thư mục ẩn
            $NgrokPath = Get-ChildItem -Recurse -Path "C:\Program Files", "C:\Users\runneradmin\AppData" -Filter "ngrok.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($NgrokPath) {
                Copy-Item $NgrokPath.FullName "." -Force
                Write-Host "Đã lôi được ngrok.exe ra thư mục làm việc!"
            } else {
                Write-Error "Không tìm thấy tiến trình ngrok nào!"
                exit 1
            }
        }

    - name: Kích hoạt RDP (Màn hình từ xa)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu cho User
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: Mở cổng và lấy Link kết nối
      run: |
        # Ép nhận lại Path ở phiên làm việc mới này
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Xác định command ngrok để chạy (gọi trực tiếp hoặc gọi file cục bộ)
        $NgrokCmd = "ngrok"
        if (Test-Path ".\ngrok.exe") { $NgrokCmd = ".\ngrok.exe" }

        Write-Host "Đang kiểm tra phiên bản và cấu hình Token..."
        $NgrokVersion = (& $NgrokCmd version)
        Write-Host "Phiên bản Ngrok đang dùng: $NgrokVersion"

        if ($NgrokVersion -match "version 3|3\.") {
            Write-Host "Đang cấu hình kiểu v3..."
            & $NgrokCmd config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        } else {
            Write-Host "Đang cấu hình kiểu v2..."
            & $NgrokCmd authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        }
        
        Write-Host "Đang khởi chạy Ngrok công khai..."
        cmd /c "start /b $NgrokCmd tcp 3389 > ngrok.log 2> ngrok_err.log"
        
        $Attempts = 0
        $MaxAttempts = 15
        $Success = $false
        
        while (-not $Success -and $Attempts -lt $MaxAttempts) {
            try {
                Start-Sleep -Seconds 3
                $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing
                $Success = $true
            } catch {
                $Attempts++
                Write-Host "Đang đợi Ngrok phản hồi... (Lần $Attempts/$MaxAttempts)"
            }
        }
        
        if ($Success) {
            Write-Host "--- LINK KẾT NỐI RDP CỦA ÔNG ĐÂY ---"
            $Response.Content | Select-String -Pattern 'tcp://[^"]+' -AllMatches | % { $_.Matches } | % { $_.Value }
            Write-Host "------------------------------------"
            Start-Sleep -Seconds 21600
        } else {
            Write-Host "========================================="
            Write-Host "=== KIỂM TRA FILE LOG THỰC TẾ CỦA NGROK ==="
            Write-Host "========================================="
            if (Test-Path "ngrok.log") { 
                Write-Host "--- NGROK.LOG CONTENT ---"
                Get-Content "ngrok.log" 
            } else { Write-Host "Không tìm thấy file ngrok.log" }
            
            if (Test-Path "ngrok_err.log") { 
                Write-Host "--- NGROK_ERR.LOG CONTENT ---"
                Get-Content "ngrok_err.log" 
            } else { Write-Host "Không tìm thấy file ngrok_err.log" }
            Write-Host "========================================="
            
            Write-Error "Ngrok sập hoàn toàn!"
            exit 1
        }
