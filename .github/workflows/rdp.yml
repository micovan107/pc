name: GitHub Actions RDP

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 

    steps:
    - name: Cài đặt và Nâng cấp Ngrok lên bản mới nhất
      run: |
        Write-Host "Đang dùng Winget để cài đặt Ngrok..."
        winget install ngrok.ngrok --accept-source-agreements --accept-package-agreements
        
        # Làm mới lại biến Path ngay tại step này
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Kiểm tra và ép nâng cấp Ngrok lên bản mới nhất để tránh lỗi v3.3.1 quá cũ
        if (Get-Command ngrok -ErrorAction SilentlyContinue) {
            Write-Host "Đang tiến hành cập nhật Ngrok lên phiên bản mới nhất từ trang chủ..."
            ngrok update
        } else {
            Write-Error "Không tìm thấy lệnh ngrok để cập nhật!"
            exit 1
        }

    - name: Kích hoạt RDP (Màn hình từ xa)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu cho User
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: Mở cổng và lấy Link kết nối
      run: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        Write-Host "Đang kiểm tra phiên bản thực tế sau khi update..."
        $NgrokVersion = (& ngrok version)
        Write-Host "Phiên bản Ngrok sau nâng cấp: $NgrokVersion"

        Write-Host "Đang cấu hình Token bảo mật..."
        ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        
        Write-Host "Đang khởi chạy Ngrok công khai..."
        cmd /c "start /b ngrok tcp 3389 > ngrok.log 2> ngrok_err.log"
        
        $Attempts = 0
        $MaxAttempts = 15
        $Success = $false
        
        while (-not $Success -and $Attempts -lt $MaxAttempts) {
            try {
                Start-Sleep -Seconds 3
                $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing
                $Success = $true
            } catch {
                $Attempts++
                Write-Host "Đang đợi Ngrok phản hồi... (Lần $Attempts/$MaxAttempts)"
            }
        }
        
        if ($Success) {
            Write-Host "--- LINK KẾT NỐI RDP CỦA ÔNG ĐÂY ---"
            $Response.Content | Select-String -Pattern 'tcp://[^"]+' -AllMatches | % { $_.Matches } | % { $_.Value }
            Write-Host "------------------------------------"
            Start-Sleep -Seconds 21600
        } else {
            Write-Host "========================================="
            Write-Host "=== KIỂM TRA FILE LOG THỰC TẾ CỦA NGROK ==="
            Write-Host "========================================="
            if (Test-Path "ngrok.log") { 
                Write-Host "--- NGROK.LOG CONTENT ---"
                Get-Content "ngrok.log" 
            } else { Write-Host "Không tìm thấy file ngrok.log" }
            
            if (Test-Path "ngrok_err.log") { 
                Write-Host "--- NGROK_ERR.LOG CONTENT ---"
                Get-Content "ngrok_err.log" 
            } else { Write-Host "Không tìm thấy file ngrok_err.log" }
            Write-Host "========================================="
            
            Write-Error "Ngrok sập hoàn toàn!"
            exit 1
        }
