name: GitHub Actions RDP

on: 
  workflow_dispatch: # Chỉ chạy khi ông bấm nút thủ công

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Tải và giải nén Ngrok (Link CDN chuẩn)
      run: |
        # Tải trực tiếp từ server chính của Ngrok, không lo chết link rpc
        Invoke-WebRequest -Uri "https://bin.equinox.io/a/nmvdrb9Uv9A/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath "D:\ngrok_files"
        
    - name: Kết nối tài khoản Ngrok
      run: |
        # Gọi đích danh file vừa giải nén để add token
        D:\ngrok_files\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: Kích hoạt RDP (Màn hình từ xa)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu cho User
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: Mở cổng và lấy Link kết nối
      run: |
        # Tạo file log thủ công bằng quyền PowerShell để tránh lỗi ghi file
        New-Item -Path "D:\ngrok_files\ngrok.log" -ItemType File -Force
        
        # Chạy ngrok bằng CMD ngầm để không bị xung đột luồng PowerShell
        cmd /c "start /B D:\ngrok_files\ngrok.exe tcp 3389 --log=stdout > D:\ngrok_files\ngrok.log 2>&1"
        
        $Attempts = 0
        $MaxAttempts = 8 # Tăng lên 8 lần cho chắc
        $Success = $false
        
        while (-not $Success -and $Attempts -lt $MaxAttempts) {
            try {
                Start-Sleep -Seconds 5
                $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing
                $Success = $true
            } catch {
                $Attempts++
                Write-Host "Đang đợi Ngrok khởi động... (Lần $Attempts/$MaxAttempts)"
            }
        }
        
        if ($Success) {
            Write-Host "--- LINK KẾT NỐI RDP CỦA ÔNG ĐÂY ---"
            $Response.Content | Select-String -Pattern 'tcp://[^"]+' -AllMatches | % { $_.Matches } | % { $_.Value }
            Write-Host "------------------------------------"
            # Treo máy 6 tiếng
            Start-Sleep -Seconds 21600
        } else {
            Write-Error "Ngrok sập rồi! Đây là nội dung log thực tế:"
            if (Test-Path "D:\ngrok_files\ngrok.log") {
                Get-Content "D:\ngrok_files\ngrok.log"
            } else {
                Write-Host "Vẫn không tạo được file log!"
            }
            exit 1
        }
