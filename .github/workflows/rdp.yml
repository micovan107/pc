name: Treo Web He Linux Xem Qua Trinh Duyet (Chrome System)

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Cài đặt giao diện đồ họa và bộ công cụ mặc định Linux
      run: |
        sudo apt-get update
        # Cài đặt môi trường đồ họa, bộ nạp icon idesk và font chữ hiển thị tiếng Trung/Nhật/Hàn/Việt ổn định
        sudo apt-get install -y xvfb openbox x11vnc novnc websockify xterm pcmanfm mousepad lxmenu-data feh idesk ttf-wqy-zenhei wget

    - name: Cấu hình Idesk và tạo Icon Chrome trên Desktop
      run: |
        mkdir -p ~/.idesktop
        
        cat << 'EOF' > ~/.ideskrc
        table Config
          FontName: WQY-ZenHei
          FontSize: 12
          TextColor: #FFFFFF
          FillStyle: fill
          IconBackground: #000000
          Transparency: 100
          Shadow[x]: 1
          Shadow[y]: 1
          ShadowColor: #000000
          Locked: true
        end
        EOF

        # Tạo file Icon gọi Google Chrome có sẵn của hệ thống ra Desktop
        cat << 'EOF' > ~/.idesktop/chrome.lnk
        table Icon
          Caption: Google Chrome
          Icon: /usr/share/icons/hicolor/48x48/apps/google-chrome.png
          X: 40
          Y: 40
          Command: google-chrome --no-sandbox --disable-dev-shm-usage
        end
        EOF

    - name: Tải và cài đặt Ngrok trên Linux
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y

    - name: Khởi chạy màn hình ảo và bật Ngrok HTTP
      run: |
        # 1. Tạo màn hình ảo ẩn dung lượng 1280x800
        Xvfb :1 -screen 0 1280x800x16 &
        export DISPLAY=:1
        sleep 2
        
        # 2. Tải hình nền theo link yêu cầu và áp dụng hình nền cho màn hình ảo bằng feh
        wget -O wallpaper.png "https://cdn2.fptshop.com.vn/unsafe/Uploads/images/tin-tuc/183983/Originals/cac-mau-background-4k-cuc-sac-net-1.png" || true
        
        # Bật trình quản lý cửa sổ và icon nền
        openbox-session &
        if [ -f wallpaper.png ]; then
          feh --bg-scale wallpaper.png &
        else
          feh --bg-solid "#000000" &
        fi
        idesk &
        sleep 2
        
        # 3. Mở cổng truyền hình ảnh vnc tối ưu mượt mà
        x11vnc -display :1 -nopw -listen localhost -bg -forever -xkb -noxfixes -noxdamage -ultrafilexfer -nevershared -dontdisconnect -shared -rfbport 5900 &
        sleep 2
        
        # 4. Chuyển đổi vnc thành giao diện Web (chạy cổng 6080)
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        sleep 2
        
        # 5. Cấu hình Token Ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # 5.5 Tạo file Traffic Policy chuẩn v3 bẻ khóa chặn Iframe
        cat << 'EOF' > policy.yml
        on_http_request:
          - actions:
              - type: add-headers
                config:
                  headers:
                    ngrok-skip-browser-warning: "true"
        on_http_response:
          - actions:
              - type: remove-headers
                config:
                  headers:
                    - Content-Security-Policy
              - type: add-headers
                config:
                  headers:
                    Content-Security-Policy: "frame-ancestors *;"
                    X-Frame-Options: "ALLOWALL"
        EOF
        
        # 6. Chạy Ngrok HTTP kèm file Traffic Policy
        ngrok http 6080 --traffic-policy-file=policy.yml --log=stdout > ngrok.log 2>&1 &
        
        # 7. Vòng lặp kiểm tra file log trích xuất link
        echo "Dang cho Ngrok cap nhat link..."
        LINK=""
        for i in {1..20}; do
          sleep 2
          if [ -f ngrok.log ]; then
            LINK=$(cat ngrok.log | grep -o 'https://[^ ]*ngrok-free\.\(app\|dev\)' | head -n 1 || true)
            if [ ! -z "$LINK" ]; then
              break
            fi
          fi
          echo "Thu lai lan $i/20..."
        done
        
        # 8. In kết quả ra màn hình công khai
        echo "=========================================="
        if [ ! -z "$LINK" ]; then
          echo "BAM VAO LINK NAY DE XEM MAN HINH WEB:"
          echo "$LINK/vnc.html"
          echo "Vào web xong chỉ cần bấm nút Connect là thấy Desktop!"
        else
          echo "Khong trich xuat duoc link tu log. Noi dung log hien tai:"
          cat ngrok.log || true
        fi
        echo "=========================================="
        
        # 9. Gọi thẳng Google Chrome gốc có sẵn của máy ảo lên màn hình ảo
        google-chrome --no-sandbox --disable-dev-shm-usage &
        
        # Treo máy đúng 4 tiếng
        sleep 14400
