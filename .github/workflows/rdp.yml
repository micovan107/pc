name: Treo Web He Linux Xem Qua Trinh Duyet (Icon+Mượt)

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Cài đặt giao diện đồ họa, bộ icon desktop và các ứng dụng Linux mặc định
      run: |
        sudo apt-get update
        # Cài đặt Openbox (WM thay thế Fluxbox để hỗ trợ icon tốt hơn), Feh (hình nền), Idesk (icon desktop), và các app mặc định
        sudo apt-get install -y xvfb openbox x11vnc novnc websockify xterm pcmanfm mousepad lxmenu-data firefox feh idesk ttf-wqy-zenhei

    - name: Cấu hình Idesk và tạo Icon Firefox trên Desktop
      run: |
        # Tạo thư mục cấu hình idesk
        mkdir -p ~/.idesktop
        
        # Tạo cấu hình idesk mẫu để set font và hiển thị icon ra màn hình
        cat << 'EOF' > ~/.ideskrc
        table Config
          FontName: WQY-ZenHei
          FontSize: 12
          TextColor: #FFFFFF
          FillStyle: fill
          IconBackground: #000000
          Transparency: 100
          Shadow[x]: 1
          Shadow[y]: 1
          ShadowColor: #000000
          Locked: true
        end
        EOF

        # Tạo file Icon Firefox ra Desktop (ông click vào icon này để mở app)
        cat << 'EOF' > ~/.idesktop/firefox.lnk
        table Icon
          Caption: Firefox Browser
          Icon: /usr/share/icons/hicolor/48x48/apps/firefox.png
          X: 50
          Y: 50
          Command: firefox --no-sandbox
        end
        EOF

    - name: Tải và cài đặt Ngrok trên Linux
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y

    - name: Khởi chạy màn hình ảo và bật Ngrok HTTP
      run: |
        # 1. Tạo màn hình ảo ẩn dung lượng 1280x800, tối ưu độ sâu màu 16-bit cho mượt
        Xvfb :1 -screen 0 1280x800x16 &
        export DISPLAY=:1
        sleep 2
        
        # 2. Bật trình quản lý cửa sổ Openbox, Feh (hình nền đen tối giản), và Idesk (icon)
        openbox-session &
        feh --bg-solid "#000000" &
        idesk &
        sleep 2
        
        # 3. Mở cổng truyền hình ảnh vnc chống sập, ĐÃ TỐI ƯU HIỆU NĂNG CHO MƯỢT
        # Thêm các cờ: -noxfixes -noxdamage -ultrafilexfer -nevershared -dontdisconnect -shared -rfbport 5900
        # Ông rảnh thì tra mạng đống cờ này là hiểu tại sao nó mượt hơn nhé!
        x11vnc -display :1 -nopw -listen localhost -bg -forever -xkb -noxfixes -noxdamage -ultrafilexfer -nevershared -dontdisconnect -shared -rfbport 5900 &
        sleep 2
        
        # 4. Chuyển đổi vnc thành giao diện Web (chạy cổng 6080)
        websockify --web /usr/share/novnc 6080 localhost:5900 &
        sleep 2
        
        # 5. Cấu hình Token Ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        # 5.5 Tạo file Traffic Policy chuẩn v3 để bẻ khóa chặn Iframe và trang cảnh báo
        cat << 'EOF' > policy.yml
        on_http_request:
          - actions:
              - type: add-headers
                config:
                  headers:
                    ngrok-skip-browser-warning: "true"
        on_http_response:
          - actions:
              - type: remove-headers
                config:
                  headers:
                    - Content-Security-Policy
              - type: add-headers
                config:
                  headers:
                    Content-Security-Policy: "frame-ancestors *;"
                    X-Frame-Options: "ALLOWALL"
        EOF
        
        # 6. Chạy Ngrok HTTP kèm file Traffic Policy vừa tạo
        ngrok http 6080 --traffic-policy-file=policy.yml --log=stdout > ngrok.log 2>&1 &
        
        # 7. Vòng lặp kiểm tra file log trích xuất link
        echo "Dang cho Ngrok cap nhat link..."
        LINK=""
        for i in {1..20}; do
          sleep 2
          if [ -f ngrok.log ]; then
            LINK=$(cat ngrok.log | grep -o 'https://[^ ]*ngrok-free\.\(app\|dev\)' | head -n 1 || true)
            if [ ! -z "$LINK" ]; then
              break
            fi
          fi
          echo "Thu lai lan $i/20..."
        done
        
        # 8. In kết quả ra màn hình công khai
        echo "=========================================="
        if [ ! -z "$LINK" ]; then
          echo "BAM VAO LINK NAY DE XEM MAN HINH WEB:"
          echo "$LINK/vnc.html"
          echo "Vào web xong chỉ cần bấm nút Connect là thấy Desktop!"
        else
          echo "Khong trich xuat duoc link tu log. Noi dung log hien tai:"
          cat ngrok.log || true
        fi
        echo "=========================================="
        
        # 9. Chỉ mở sẵn duy nhất Firefox cho sạch màn hình, cần app khác thì CLICK VÀO ICON DESKTOP hoặc CLICK CHUỘT PHẢI
        firefox --no-sandbox &
        
        # Treo máy đúng 4 tiếng
        sleep 14400
