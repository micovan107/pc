name: GitHub Actions RDP

on: 
  workflow_dispatch: # Chỉ chạy khi ông bấm nút thủ công

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: 1. Tải Ngrok Tự Động (Bản Mới Nhất)
      run: |
        # Tự động lấy link tải trực tiếp bản Windows ổn định mới nhất từ trang chủ
        $DownloadUrl = (Invoke-WebRequest -Uri "https://ngrok.com/download" -UseBasicParsing).Content | Select-String -Pattern 'https://bin.equinox.io/[^"]+windows-amd64.zip' -AllMatches | % { $_.Matches } | % { $_.Value } | Select-Object -First 1
        Write-Host "Link tải tìm được: $DownloadUrl"
        
        # Tiến hành tải và giải nén vào thư mục riêng
        Invoke-WebRequest -Uri $DownloadUrl -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath "D:\ngrok_tool" -Force
        
    - name: 2. Kích hoạt RDP Hệ thống
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: 3. Tạo User Đăng Nhập
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: 4. Kết nối và Mở cổng RDP
      run: |
        # Đưa token vào cấu hình
        D:\ngrok_tool\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        Write-Host "--- ĐANG KHỞI CHẠY NGROK VÀ LẤY LINK ---"
        # Chạy trực tiếp để xả log lỗi (nếu có) lên thẳng màn hình GitHub Actions
        D:\ngrok_tool\ngrok.exe tcp 3389
