name: Treo Web He Linux Xem Qua Trinh Duyet (Chrome System)

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
    - name: Cài đặt giao diện đồ họa và bộ công cụ mặc định Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb openbox x11vnc novnc websockify xterm pcmanfm mousepad lxmenu-data feh idesk ttf-wqy-zenhei wget

    - name: Cấu hình Idesk và tạo Icon Chrome trên Desktop
      run: |
        mkdir -p ~/.idesktop
        
        cat << 'EOF' > ~/.ideskrc
        table Config
          FontName: WQY-ZenHei
          FontSize: 12
          TextColor: #FFFFFF
          FillStyle: fill
          IconBackground: #000000
          Transparency: 100
          Shadow[x]: 1
          Shadow[y]: 1
          ShadowColor: #000000
          Locked: true
        end
        EOF

        cat << 'EOF' > ~/.idesktop/chrome.lnk
        table Icon
          Caption: Google Chrome
          Icon: /usr/share/icons/hicolor/48x48/apps/google-chrome.png
          X: 40
          Y: 40
          Command: google-chrome --no-sandbox --disable-dev-shm-usage
        end
        EOF

    - name: Khởi chạy màn hình ảo và bật Tunnel qua Pinggy
      run: |
        # 1. Tạo màn hình ảo ẩn dung lượng 1280x800
        Xvfb :1 -screen 0 1280x800x16 &
        export DISPLAY=:1
        sleep 2
        
        # 2. Tải hình nền theo link yêu cầu và áp dụng bằng feh
        wget -O wallpaper.png "https://cdn2.fptshop.com.vn/unsafe/Uploads/images/tin-tuc/183983/Originals/cac-mau-background-4k-cuc-sac-net-1.png" || true
        
        openbox-session &
        if [ -f wallpaper.png ]; then
          feh --bg-scale wallpaper.png &
        else
          feh --bg-solid "#000000" &
        fi
        idesk &
        sleep 2
        
        # 3. Mở cổng truyền hình ảnh vnc tối ưu mượt mà
        x11vnc -display :1 -nopw -listen localhost -bg -forever -xkb -noxfixes -noxdamage -ultrafilexfer -nevershared -dontdisconnect -shared -rfbport 5900 &
        sleep 2
        
        # 4. Tạo chứng chỉ mã hóa tự chế và chạy websockify hệ mã hóa (chạy cổng 6080)
        openssl req -x509 -nodes -newkey rsa:2048 -keyout ~/novnc.pem -out ~/novnc.pem -days 365 -subj "/C=VN/ST=NamDinh/L=NamDinh/O=Vex/CN=localhost"
        websockify --web /usr/share/novnc --cert ~/novnc.pem 6080 localhost:5900 &
        sleep 2
        
        # 5. Khởi chạy Pinggy qua SSH bẻ khóa trang cảnh báo, hỗ trợ chéo domain mượt mà
        ssh -p 443 -R0:localhost:6080 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io "b:skip_browser_warning=true+cors=true" > pinggy.log 2>&1 &
        
        # 6. Vòng lặp kiểm tra file log trích xuất link mới của Pinggy
        echo "Dang cho Pinggy cap nhat link..."
        LINK=""
        for i in {1..20}; do
          sleep 2
          if [ -f pinggy.log ]; then
            LINK=$(cat pinggy.log | grep -o 'https://[^ ]*\.pinggy-free\.link' | head -n 1 || true)
            if [ ! -z "$LINK" ]; then
              break
            fi
          fi
          echo "Thu lai lan $i/20..."
        done
        
        # 7. TỰ ĐỘNG BẮN LINK VỀ SERVER PHP CỦA ÔNG
        echo "=========================================="
        if [ ! -z "$LINK" ]; then
          FULL_URL="$LINK/vnc_lite.html?autoconnect=true&encrypt=1&path=websockify"
          echo "LINK CỦA ÔNG ĐÂY:"
          echo "$FULL_URL"
          
          # Thực hiện cú đấm curl thần sầu gửi data lên PHP
          curl -X POST -H "Content-Type: application/json" -d "{\"url\":\"$FULL_URL\"}" "${{ secrets.WEBHOOK_URL }}"
          echo -e "\n[OK] Da tu dong ban link ve server PHP cua ong!"
        else
          echo "Loi khong trich xuat duoc link tu log."
          cat pinggy.log || true
        fi
        echo "=========================================="
        
        # 8. Gọi thẳng Google Chrome gốc có sẵn của máy ảo lên màn hình ảo
        google-chrome --no-sandbox --disable-dev-shm-usage &
        
        # Treo máy đúng 4 tiếng
        sleep 14400
