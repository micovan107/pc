name: GitHub Actions RDP

on: 
  workflow_dispatch: # Chỉ chạy khi ông bấm nút thủ công

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360 # Giới hạn tối đa 6 tiếng

    steps:
    - name: Cài đặt Ngrok bằng Choco chuẩn chỉnh
      run: |
        # Dùng Choco để cài bản mới nhất từ chợ ứng dụng Windows, không lo chết link rpc
        choco install ngrok -y
        
    - name: Làm mới biến môi trường và kết nối tài khoản
      run: |
        # Ép PowerShell cập nhật lại Path ngay lập tức để nhận lệnh ngrok vừa cài
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Cấu hình Token từ Secrets
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
    - name: Kích hoạt RDP (Màn hình từ xa)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
    - name: Tạo mật khẩu cho User
      run: |
        $Password = ConvertTo-SecureString "MatKhauSieuCapVip123!" -AsPlainText -Force
        New-LocalUser "GamerChuaNet" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Administrators" -Member "GamerChuaNet"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "GamerChuaNet"
        
    - name: Mở cổng và lấy Link kết nối
      run: |
        # Cập nhật lại Path một lần nữa cho chắc cú ở phiên làm việc này
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        
        # Tạo file log để kiểm tra nếu có lỗi
        New-Item -Path "ngrok.log" -ItemType File -Force
        
        # Khởi chạy ngrok ẩn ngầm và đẩy log ra file
        Start-Process -FilePath "ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log"
        
        $Attempts = 0
        $MaxAttempts = 30
        $Success = $false
        
        while (-not $Success -and $Attempts -lt $MaxAttempts) {
            try {
                Start-Sleep -Seconds 5
                $Response = Invoke-WebRequest -Uri "http://127.0.0.1:4040/api/tunnels" -UseBasicParsing
                $Success = $true
            } catch {
                $Attempts++
                Write-Host "Đang đợi Ngrok khởi động... (Lần $Attempts/$MaxAttempts)"
            }
        }
        
        if ($Success) {
            Write-Host "--- LINK KẾT NỐI RDP CỦA ÔNG ĐÂY ---"
            $Response.Content | Select-String -Pattern 'tcp://[^"]+' -AllMatches | % { $_.Matches } | % { $_.Value }
            Write-Host "------------------------------------"
            # Treo máy ảo đúng 6 tiếng
            Start-Sleep -Seconds 21600
        } else {
            Write-Error "Ngrok sập rồi! Đây là nội dung log thực tế:"
            if (Test-Path "ngrok.log") {
                Get-Content "ngrok.log"
            } else {
                Write-Host "Không tìm thấy file log!"
            }
            exit 1
        }
